<div class="landing-section" id="landingDiv">
  <div class="landing-container">
    <div class="landing-intro">
      <h2>Hello! I'm</h2>
      <h1>
        {{ firstName }}
        <br />
        <span *ngIf="lastName">{{ lastName }}</span>
      </h1>
    </div>
    <div class="landing-info">
      <h3>A</h3>
      <h2 class="landing-info-h2">
        <div class="landing-h2-1">Full-Stack Developer</div>
      </h2>
      <h2>
        <div class="landing-h2-info">Angular &amp; ASP.NET Core</div>
      </h2>
    </div>
    <!-- Mobile photo - shows only on mobile when 3D character is hidden -->
    <div class="mobile-photo">
      <img src="/images/mypicnbg.png" alt="Esraa Shiref" />
    </div>
  </div>
</div>
